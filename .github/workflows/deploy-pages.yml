name: Deploy scrubber to GitHub Pages

# Auto-deploy on pushes to main that touch publishable assets, and
# allow manual dispatch for re-deploys without a code change. The path
# filter avoids redeploying for doc/plan/script changes that don't
# affect what's served on Pages.
on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'data/derived/**'
      - 'figures/**'
      - 'index.html'
      - '.nojekyll'
  workflow_dispatch:
    inputs:
      data_bundle_tag:
        description: 'Pinned published data release tag, e.g. bcf-visualization-data-v20260509.1-ch194-120.1. Leave blank to package committed data/derived.'
        required: false
        type: string
      data_runtime_asset:
        description: 'Runtime asset from data_bundle_tag, e.g. bcf-visualization-runtime-v20260509.1-ch194-120.1.tar.gz.'
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Stage publishable subset
        # Only the scrubber, runtime data package, and figure PNGs go to
        # Pages. The EPUBs, MHTs, and xlsx in data/raw/ are explicitly
        # excluded so source prose isn't republished by a Pages deploy.
        run: |
          mkdir -p _site
          cp .nojekyll index.html _site/
          cp -r web      _site/
          cp -r figures  _site/

      - name: Stage data package
        env:
          GH_TOKEN: ${{ github.token }}
          DATA_BUNDLE_TAG: ${{ inputs.data_bundle_tag }}
          DATA_RUNTIME_ASSET: ${{ inputs.data_runtime_asset }}
          DEPLOYED_PACKAGES_URL: https://deinspanjer.github.io/bcf-visualization/data/packages.json
          DEFAULT_DATA_BUNDLE_TAG: bcf-visualization-data-v20260510.6-ch194-120.1
          DEFAULT_DATA_RUNTIME_ASSET: bcf-visualization-runtime-v20260510.6-ch194-120.1.tar.gz
        run: |
          mkdir -p .data-release
          PREPARE_ARGS=(--site-dir _site)
          if [ -n "$DATA_BUNDLE_TAG" ]; then
            if [ -z "$DATA_RUNTIME_ASSET" ]; then
              echo "ERROR: data_runtime_asset is required when data_bundle_tag is set" >&2
              exit 1
            fi
            gh release download "$DATA_BUNDLE_TAG" \
              --pattern "$DATA_RUNTIME_ASSET" \
              --dir .data-release
            RUNTIME_TAR=".data-release/$DATA_RUNTIME_ASSET"
            PREPARE_ARGS+=(--runtime-tar "$RUNTIME_TAR")
          elif [ ! -f data/derived/chapter_facts.json ]; then
            python3 scripts/data_release.py download-pages-runtimes \
              --packages-url "$DEPLOYED_PACKAGES_URL" \
              --output-dir .pages-runtimes \
              --fallback-tag "$DEFAULT_DATA_BUNDLE_TAG" \
              --fallback-asset "$DEFAULT_DATA_RUNTIME_ASSET" \
              --metadata-output .pages-runtimes/packages.json
            while IFS= read -r runtime_tar; do
              PREPARE_ARGS+=(--runtime-tar "$runtime_tar")
            done < <(find .pages-runtimes -maxdepth 1 -name 'bcf-visualization-runtime-*.tar.gz' -print | sort)
            DEFAULT_PACKAGE_ID="$(python3 -c 'import json; print(json.load(open(".pages-runtimes/packages.json")).get("default_package_id") or "")')"
            if [ -n "$DEFAULT_PACKAGE_ID" ]; then
              PREPARE_ARGS+=(--default-package-id "$DEFAULT_PACKAGE_ID")
            fi
            PREPARE_ARGS+=(--package-metadata-file .pages-runtimes/packages.json)
          else
            python3 scripts/data_release.py package \
              --output-dir .data-release \
              --date "$(date -u +%Y%m%d)" \
              --build-number "$GITHUB_RUN_NUMBER" \
              --source-commit "$GITHUB_SHA"
            RUNTIME_TAR="$(find .data-release -maxdepth 1 -name 'bcf-visualization-runtime-*.tar.gz' -print -quit)"
            PREPARE_ARGS+=(--runtime-tar "$RUNTIME_TAR")
          fi
          python3 scripts/data_release.py prepare-pages \
            "${PREPARE_ARGS[@]}" \
            --skip-incompatible-runtime
          PACKAGE_ID="$(python3 -c 'import json; print(json.load(open("_site/data/packages.json"))["default_package_id"])')"
          python3 scripts/data_release.py prepare-pages \
            "${PREPARE_ARGS[@]}" \
            --package-smoke-status "$PACKAGE_ID=passed" \
            --skip-incompatible-runtime
          # Sanity check: nothing under data/raw/ should be in _site/
          if find _site -path '*data/raw*' -print -quit | grep -q .; then
            echo "ERROR: _site contains data/raw content" >&2
            exit 1
          fi
          test -f _site/data/packages.json
          test -f _site/data/default/data_package.json
          ls -la _site/

      - name: Install browser smoke dependencies
        run: |
          python3 -m pip install '.[dev]'
          python3 -m playwright install --with-deps chromium

      - name: Smoke test staged site
        run: |
          python3 scripts/smoke_pages_site.py --site-dir _site --browser

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
