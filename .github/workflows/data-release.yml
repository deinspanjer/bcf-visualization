name: Build data release

on:
  workflow_dispatch:
    inputs:
      package_date:
        description: 'Data package date in YYYYMMDD. Leave blank for current UTC date.'
        required: false
        type: string
      build_number:
        description: 'Data package build number. Leave blank for the workflow run number.'
        required: false
        type: string
      draft:
        description: 'Create a draft release. Draft releases are not usable by the Pages deploy workflow until published.'
        required: true
        default: false
        type: boolean
      source_data_tag:
        description: 'Published maintainer data release to hydrate data/derived when generated JSON is not committed.'
        required: false
        default: 'bcf-visualization-data-v20260509.4-ch194-120.1'
        type: string
      source_data_asset:
        description: 'Maintainer data asset from source_data_tag.'
        required: false
        default: 'bcf-visualization-data-v20260509.4-ch194-120.1.tar.gz'
        type: string
      regenerate:
        description: 'Regenerate release data from committed manual inputs after hydrating source_data_asset.'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build data bundles
        id: build
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_DATA_TAG: ${{ inputs.source_data_tag }}
          SOURCE_DATA_ASSET: ${{ inputs.source_data_asset }}
          REGENERATE: ${{ inputs.regenerate }}
        run: |
          if [ ! -f data/derived/chapter_facts.json ]; then
            if [ -z "$SOURCE_DATA_TAG" ] || [ -z "$SOURCE_DATA_ASSET" ]; then
              echo "ERROR: data/derived is not hydrated; provide source_data_tag and source_data_asset" >&2
              exit 1
            fi
            python3 scripts/data_release.py download-dev \
              --tag "$SOURCE_DATA_TAG" \
              --asset "$SOURCE_DATA_ASSET"
          fi
          if [ "$REGENERATE" = "true" ]; then
            python3 -m pip install -r requirements.txt
            python3 scripts/download_bcf_epub.py
            python3 scripts/derive_roll_facts.py
            python3 scripts/build_chapter_facts.py
          fi
          DATE="${{ inputs.package_date }}"
          BUILD="${{ inputs.build_number }}"
          if [ -z "$DATE" ]; then
            DATE="$(date -u +%Y%m%d)"
          fi
          if [ -z "$BUILD" ]; then
            BUILD="$GITHUB_RUN_NUMBER"
          fi
          python3 scripts/data_release.py package \
            --output-dir .data-release \
            --date "$DATE" \
            --build-number "$BUILD" \
            --source-commit "$GITHUB_SHA"
          TAG="$(python3 scripts/data_release.py version-tag \
            --date "$DATE" \
            --build-number "$BUILD")"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          DRAFT: ${{ inputs.draft }}
          TAG: ${{ steps.build.outputs.tag }}
        run: |
          DRAFT_FLAG=""
          if [ "$DRAFT" = "true" ]; then
            DRAFT_FLAG="--draft"
          fi
          gh release create "$TAG" \
            .data-release/*.tar.gz \
            .data-release/SHA256SUMS \
            --title "BCF data ${TAG#bcf-visualization-data-v}" \
            --notes "Versioned BCF derived data bundle ${TAG}." \
            $DRAFT_FLAG
