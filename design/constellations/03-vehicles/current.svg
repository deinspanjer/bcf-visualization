<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320"
       color="oklch(0.82 0.14 30)">
    <title>Vehicles</title>
    <desc>Vehicles as a constellation of its 13 jumps. One marker per jump.</desc>
    <defs xmlns="http://www.w3.org/2000/svg">
          <linearGradient id="ray-grad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="transparent"/>
            <stop offset="0.48" stop-color="#fff" stop-opacity="0.58"/>
            <stop offset="0.50" stop-color="#fff" stop-opacity="0.92"/>
            <stop offset="0.52" stop-color="#fff" stop-opacity="0.58"/>
            <stop offset="1" stop-color="transparent"/>
          </linearGradient>
          <symbol id="star-mark" viewBox="-50 -50 100 100" overflow="visible">
            <g filter="drop-shadow(0 0 1px #fff) drop-shadow(0 0 3px currentColor)" opacity="0.76">
              <g opacity="0.68" style="mix-blend-mode:screen">
                <rect x="-32.00" y="-0.390" width="64.00" height="0.780" rx="0.390" fill="url(#ray-grad)" transform="rotate(-3.00)"/>
                <rect x="-32.00" y="-0.390" width="64.00" height="0.780" rx="0.390" fill="url(#ray-grad)" transform="rotate(63.00)"/>
                <rect x="-32.00" y="-0.390" width="64.00" height="0.780" rx="0.390" fill="url(#ray-grad)" transform="rotate(117.00)"/>
                <rect x="-32.00" y="-0.390" width="64.00" height="0.780" rx="0.390" fill="url(#ray-grad)" transform="rotate(183.00)"/>
                <rect x="-32.00" y="-0.390" width="64.00" height="0.780" rx="0.390" fill="url(#ray-grad)" transform="rotate(237.00)"/>
                <rect x="-32.00" y="-0.390" width="64.00" height="0.780" rx="0.390" fill="url(#ray-grad)" transform="rotate(303.00)"/>
              </g>
              <g opacity="0.32" style="mix-blend-mode:screen">
                <rect x="-18.00" y="-0.125" width="36.00" height="0.250" rx="0.125" fill="url(#ray-grad)" transform="rotate(27.00)"/>
                <rect x="-18.00" y="-0.125" width="36.00" height="0.250" rx="0.125" fill="url(#ray-grad)" transform="rotate(93.00)"/>
                <rect x="-18.00" y="-0.125" width="36.00" height="0.250" rx="0.125" fill="url(#ray-grad)" transform="rotate(147.00)"/>
                <rect x="-18.00" y="-0.125" width="36.00" height="0.250" rx="0.125" fill="url(#ray-grad)" transform="rotate(213.00)"/>
                <rect x="-18.00" y="-0.125" width="36.00" height="0.250" rx="0.125" fill="url(#ray-grad)" transform="rotate(267.00)"/>
                <rect x="-18.00" y="-0.125" width="36.00" height="0.250" rx="0.125" fill="url(#ray-grad)" transform="rotate(333.00)"/>
              </g>
              <circle r="2.2" fill="currentColor" opacity="0.16"/>
              <circle r="1.4" fill="#fff"/>
            </g>
          </symbol>
        </defs>

    <!-- Wireframe edges edited in tracing-workbench.html. -->
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="0,230 0,180 100,160 120,120"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="120,230 210,230"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="320,180 320,230"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="40,230 0,230"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="120,120 240,120"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="240,120 320,180"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="290,230 320,230"/>

    <!-- One diffraction-spike marker per unique vertex. -->
    <g class="jump-markers">
      <use href="#star-mark" x="-15" y="215" width="30" height="30"/>
      <use href="#star-mark" x="-15" y="165" width="30" height="30"/>
      <use href="#star-mark" x="85" y="145" width="30" height="30"/>
      <use href="#star-mark" x="105" y="105" width="30" height="30"/>
      <use href="#star-mark" x="105" y="215" width="30" height="30"/>
      <use href="#star-mark" x="195" y="215" width="30" height="30"/>
      <use href="#star-mark" x="225" y="105" width="30" height="30"/>
      <use href="#star-mark" x="305" y="165" width="30" height="30"/>
      <use href="#star-mark" x="305" y="215" width="30" height="30"/>
      <use href="#star-mark" x="65" y="205" width="30" height="30"/>
      <use href="#star-mark" x="235" y="205" width="30" height="30"/>
      <use href="#star-mark" x="25" y="215" width="30" height="30"/>
      <use href="#star-mark" x="275" y="215" width="30" height="30"/>
    </g>
  </svg>
