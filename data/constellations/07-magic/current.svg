<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" data-vertex-source="jumps"
       color="oklch(0.82 0.14 286)">
    <title>Magic</title>
    <desc>Magic as a constellation of its 14 jumps. One marker per jump.</desc>
    <defs xmlns="http://www.w3.org/2000/svg">
          <linearGradient id="ray-grad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="transparent"/>
            <stop offset="0.48" stop-color="#fff" stop-opacity="0.58"/>
            <stop offset="0.50" stop-color="#fff" stop-opacity="0.92"/>
            <stop offset="0.52" stop-color="#fff" stop-opacity="0.58"/>
            <stop offset="1" stop-color="transparent"/>
          </linearGradient>
          <symbol id="star-mark" viewBox="-50 -50 100 100" overflow="visible">
            <g filter="drop-shadow(0 0 1px #fff) drop-shadow(0 0 3px currentColor)" opacity="0.76">
              <g opacity="0.68" style="mix-blend-mode:screen">
                <rect x="-32.00" y="-0.390" width="64.00" height="0.780" rx="0.390" fill="url(#ray-grad)" transform="rotate(-3.00)"/>
                <rect x="-32.00" y="-0.390" width="64.00" height="0.780" rx="0.390" fill="url(#ray-grad)" transform="rotate(63.00)"/>
                <rect x="-32.00" y="-0.390" width="64.00" height="0.780" rx="0.390" fill="url(#ray-grad)" transform="rotate(117.00)"/>
                <rect x="-32.00" y="-0.390" width="64.00" height="0.780" rx="0.390" fill="url(#ray-grad)" transform="rotate(183.00)"/>
                <rect x="-32.00" y="-0.390" width="64.00" height="0.780" rx="0.390" fill="url(#ray-grad)" transform="rotate(237.00)"/>
                <rect x="-32.00" y="-0.390" width="64.00" height="0.780" rx="0.390" fill="url(#ray-grad)" transform="rotate(303.00)"/>
              </g>
              <g opacity="0.32" style="mix-blend-mode:screen">
                <rect x="-18.00" y="-0.125" width="36.00" height="0.250" rx="0.125" fill="url(#ray-grad)" transform="rotate(27.00)"/>
                <rect x="-18.00" y="-0.125" width="36.00" height="0.250" rx="0.125" fill="url(#ray-grad)" transform="rotate(93.00)"/>
                <rect x="-18.00" y="-0.125" width="36.00" height="0.250" rx="0.125" fill="url(#ray-grad)" transform="rotate(147.00)"/>
                <rect x="-18.00" y="-0.125" width="36.00" height="0.250" rx="0.125" fill="url(#ray-grad)" transform="rotate(213.00)"/>
                <rect x="-18.00" y="-0.125" width="36.00" height="0.250" rx="0.125" fill="url(#ray-grad)" transform="rotate(267.00)"/>
                <rect x="-18.00" y="-0.125" width="36.00" height="0.250" rx="0.125" fill="url(#ray-grad)" transform="rotate(333.00)"/>
              </g>
              <circle r="2.2" fill="currentColor" opacity="0.16"/>
              <circle r="1.4" fill="#fff"/>
            </g>
          </symbol>
        </defs>

    <!-- Wireframe edges edited in tracing-workbench.html. -->
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="210,170 250,180"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="250,180 270,200"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="270,200 230,220"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="230,220 150,230"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="150,230 70,220"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="70,220 30,200"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="30,200 50,180"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="50,180 90,170"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="150,20 80,180"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="150,20 220,180"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="220,180 150,190 80,180"/>

    <!-- One diffraction-spike marker per unique vertex. -->
    <g class="jump-markers">
      <use href="#star-mark" x="135" y="5" width="30" height="30"/>
      <use href="#star-mark" x="65" y="165" width="30" height="30"/>
      <use href="#star-mark" x="205" y="165" width="30" height="30"/>
      <use href="#star-mark" x="75" y="155" width="30" height="30"/>
      <use href="#star-mark" x="195" y="155" width="30" height="30"/>
      <use href="#star-mark" x="15" y="185" width="30" height="30"/>
      <use href="#star-mark" x="255" y="185" width="30" height="30"/>
      <use href="#star-mark" x="55" y="205" width="30" height="30"/>
      <use href="#star-mark" x="215" y="205" width="30" height="30"/>
      <use href="#star-mark" x="135" y="215" width="30" height="30"/>
      <use href="#star-mark" x="35" y="165" width="30" height="30"/>
      <use href="#star-mark" x="235" y="165" width="30" height="30"/>
      <use href="#star-mark" x="135" y="105" width="30" height="30"/>
      <use href="#star-mark" x="135" y="175" width="30" height="30"/>
    </g>
  </svg>
