<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" data-vertex-source="jumps"
       color="oklch(0.82 0.14 196)">
    <title>Toolkits</title>
    <desc>Toolkits as a constellation of its 24 jumps. One marker per jump.</desc>
    <defs>
      <linearGradient id="ray-grad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0"    stop-color="transparent"/>
        <stop offset="0.48" stop-color="#fff" stop-opacity="0.58"/>
        <stop offset="0.50" stop-color="#fff" stop-opacity="0.92"/>
        <stop offset="0.52" stop-color="#fff" stop-opacity="0.58"/>
        <stop offset="1"    stop-color="transparent"/>
      </linearGradient>
    <symbol id="star-mark" viewBox="-50 -50 100 100" overflow="visible">
      <g filter="drop-shadow(0 0 1px #fff) drop-shadow(0 0 3px currentColor)" opacity="0.76">
        <g opacity="0.68" style="mix-blend-mode:screen">
        <rect x="-32.00" y="-0.390" width="64.00" height="0.780" rx="0.390" fill="url(#ray-grad)" transform="rotate(-3.00)"/>
        <rect x="-32.00" y="-0.390" width="64.00" height="0.780" rx="0.390" fill="url(#ray-grad)" transform="rotate(63.00)"/>
        <rect x="-32.00" y="-0.390" width="64.00" height="0.780" rx="0.390" fill="url(#ray-grad)" transform="rotate(117.00)"/>
        <rect x="-32.00" y="-0.390" width="64.00" height="0.780" rx="0.390" fill="url(#ray-grad)" transform="rotate(183.00)"/>
        <rect x="-32.00" y="-0.390" width="64.00" height="0.780" rx="0.390" fill="url(#ray-grad)" transform="rotate(237.00)"/>
        <rect x="-32.00" y="-0.390" width="64.00" height="0.780" rx="0.390" fill="url(#ray-grad)" transform="rotate(303.00)"/>
        </g>
        <g opacity="0.32" style="mix-blend-mode:screen">
        <rect x="-18.00" y="-0.125" width="36.00" height="0.250" rx="0.125" fill="url(#ray-grad)" transform="rotate(27.00)"/>
        <rect x="-18.00" y="-0.125" width="36.00" height="0.250" rx="0.125" fill="url(#ray-grad)" transform="rotate(93.00)"/>
        <rect x="-18.00" y="-0.125" width="36.00" height="0.250" rx="0.125" fill="url(#ray-grad)" transform="rotate(147.00)"/>
        <rect x="-18.00" y="-0.125" width="36.00" height="0.250" rx="0.125" fill="url(#ray-grad)" transform="rotate(213.00)"/>
        <rect x="-18.00" y="-0.125" width="36.00" height="0.250" rx="0.125" fill="url(#ray-grad)" transform="rotate(267.00)"/>
        <rect x="-18.00" y="-0.125" width="36.00" height="0.250" rx="0.125" fill="url(#ray-grad)" transform="rotate(333.00)"/>
        </g>
        <circle r="2.2" fill="currentColor" opacity="0.16"/>
        <circle r="1.4" fill="#fff"/>
      </g>
    </symbol>
    </defs>


    <!-- Wireframe edges scaled from reference.svg into the constellation canvas. -->
    <polyline class="cluster-outline" points="24.0,186.8 296.0,186.8 296.0,198.8 24.0,198.8 24.0,186.8"
              fill="none" stroke="currentColor" stroke-opacity="0.32"
              stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round"/>
    <polyline class="cluster-outline" points="42.8,198.8 277.2,198.8 277.2,275.0 42.8,275.0 42.8,198.8"
              fill="none" stroke="currentColor" stroke-opacity="0.32"
              stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round"/>
    <polyline class="cluster-outline" points="106.7,85.4 91.4,95.4 102.0,111.2 114.9,120.6 158.8,186.8 161.2,186.8 164.7,181.0 120.7,115.9 117.2,100.6 106.7,85.4"
              fill="none" stroke="currentColor" stroke-opacity="0.32"
              stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round"/>
    <polyline class="cluster-outline" points="161.2,186.8 185.2,186.8 232.7,97.7 214.5,87.2 164.7,181.0 161.2,186.8"
              fill="none" stroke="currentColor" stroke-opacity="0.32"
              stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round"/>
    <polyline class="cluster-outline" points="188.7,71.9 204.6,45.0 273.7,105.9 267.3,116.5 232.7,97.7 214.5,87.2 188.7,71.9"
              fill="none" stroke="currentColor" stroke-opacity="0.32"
              stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round"/>

    <!-- One diffraction-spike marker per unique reference vertex. -->
    <g class="jump-markers">
      <use href="#star-mark" x="9.0" y="171.8" width="30" height="30"/>
      <use href="#star-mark" x="9.0" y="183.8" width="30" height="30"/>
      <use href="#star-mark" x="27.8" y="183.8" width="30" height="30"/>
      <use href="#star-mark" x="27.8" y="260.0" width="30" height="30"/>
      <use href="#star-mark" x="76.4" y="80.4" width="30" height="30"/>
      <use href="#star-mark" x="87.0" y="96.2" width="30" height="30"/>
      <use href="#star-mark" x="91.7" y="70.4" width="30" height="30"/>
      <use href="#star-mark" x="99.9" y="105.6" width="30" height="30"/>
      <use href="#star-mark" x="102.2" y="85.6" width="30" height="30"/>
      <use href="#star-mark" x="105.7" y="100.9" width="30" height="30"/>
      <use href="#star-mark" x="143.8" y="171.8" width="30" height="30"/>
      <use href="#star-mark" x="146.2" y="171.8" width="30" height="30"/>
      <use href="#star-mark" x="149.7" y="166.0" width="30" height="30"/>
      <use href="#star-mark" x="170.2" y="171.8" width="30" height="30"/>
      <use href="#star-mark" x="173.7" y="56.9" width="30" height="30"/>
      <use href="#star-mark" x="189.6" y="30.0" width="30" height="30"/>
      <use href="#star-mark" x="199.5" y="72.2" width="30" height="30"/>
      <use href="#star-mark" x="217.7" y="82.7" width="30" height="30"/>
      <use href="#star-mark" x="252.3" y="101.5" width="30" height="30"/>
      <use href="#star-mark" x="258.7" y="90.9" width="30" height="30"/>
      <use href="#star-mark" x="262.2" y="183.8" width="30" height="30"/>
      <use href="#star-mark" x="262.2" y="260.0" width="30" height="30"/>
      <use href="#star-mark" x="281.0" y="171.8" width="30" height="30"/>
      <use href="#star-mark" x="281.0" y="183.8" width="30" height="30"/>
    </g>
