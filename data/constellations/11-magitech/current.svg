<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320"
       color="oklch(0.82 0.14 240)">
    <title>Magitech</title>
    <desc>Magitech as a constellation of its 10 jumps. One marker per jump.</desc>
    <defs xmlns="http://www.w3.org/2000/svg">
              <linearGradient id="ray-grad" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0" stop-color="transparent"/>
                <stop offset="0.48" stop-color="#fff" stop-opacity="0.58"/>
                <stop offset="0.50" stop-color="#fff" stop-opacity="0.92"/>
                <stop offset="0.52" stop-color="#fff" stop-opacity="0.58"/>
                <stop offset="1" stop-color="transparent"/>
              </linearGradient>
              <symbol id="star-mark" viewBox="-50 -50 100 100" overflow="visible">
                <g filter="drop-shadow(0 0 1px #fff) drop-shadow(0 0 3px currentColor)" opacity="0.76">
                  <g opacity="0.68" style="mix-blend-mode:screen">
                    <rect x="-32.00" y="-0.390" width="64.00" height="0.780" rx="0.390" fill="url(#ray-grad)" transform="rotate(-3.00)"/>
                    <rect x="-32.00" y="-0.390" width="64.00" height="0.780" rx="0.390" fill="url(#ray-grad)" transform="rotate(63.00)"/>
                    <rect x="-32.00" y="-0.390" width="64.00" height="0.780" rx="0.390" fill="url(#ray-grad)" transform="rotate(117.00)"/>
                    <rect x="-32.00" y="-0.390" width="64.00" height="0.780" rx="0.390" fill="url(#ray-grad)" transform="rotate(183.00)"/>
                    <rect x="-32.00" y="-0.390" width="64.00" height="0.780" rx="0.390" fill="url(#ray-grad)" transform="rotate(237.00)"/>
                    <rect x="-32.00" y="-0.390" width="64.00" height="0.780" rx="0.390" fill="url(#ray-grad)" transform="rotate(303.00)"/>
                  </g>
                  <g opacity="0.32" style="mix-blend-mode:screen">
                    <rect x="-18.00" y="-0.125" width="36.00" height="0.250" rx="0.125" fill="url(#ray-grad)" transform="rotate(27.00)"/>
                    <rect x="-18.00" y="-0.125" width="36.00" height="0.250" rx="0.125" fill="url(#ray-grad)" transform="rotate(93.00)"/>
                    <rect x="-18.00" y="-0.125" width="36.00" height="0.250" rx="0.125" fill="url(#ray-grad)" transform="rotate(147.00)"/>
                    <rect x="-18.00" y="-0.125" width="36.00" height="0.250" rx="0.125" fill="url(#ray-grad)" transform="rotate(213.00)"/>
                    <rect x="-18.00" y="-0.125" width="36.00" height="0.250" rx="0.125" fill="url(#ray-grad)" transform="rotate(267.00)"/>
                    <rect x="-18.00" y="-0.125" width="36.00" height="0.250" rx="0.125" fill="url(#ray-grad)" transform="rotate(333.00)"/>
                  </g>
                  <circle r="2.2" fill="currentColor" opacity="0.16"/>
                  <circle r="1.4" fill="#fff"/>
                </g>
              </symbol>
            </defs>

    <!-- Wireframe edges edited in tracing-workbench.html. -->
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="104,80 168,152"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="104,224 168,152"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="168,80 168,152"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="168,152 168,224"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="168,152 224,152"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="224,152 288,32"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="224,152 248,168"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="248,168 176,296"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="8,152 168,152"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="104,80 104,224"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="176,296 304,152"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="304,152 272,136"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="272,136 288,32"/>

    <!-- One diffraction-spike marker per unique vertex. -->
    <g class="jump-markers">
      <use href="#star-mark" x="-7" y="137" width="30" height="30"/>
      <use href="#star-mark" x="89" y="65" width="30" height="30"/>
      <use href="#star-mark" x="153" y="137" width="30" height="30"/>
      <use href="#star-mark" x="89" y="209" width="30" height="30"/>
      <use href="#star-mark" x="153" y="65" width="30" height="30"/>
      <use href="#star-mark" x="153" y="209" width="30" height="30"/>
      <use href="#star-mark" x="209" y="137" width="30" height="30"/>
      <use href="#star-mark" x="273" y="17" width="30" height="30"/>
      <use href="#star-mark" x="233" y="153" width="30" height="30"/>
      <use href="#star-mark" x="161" y="281" width="30" height="30"/>
      <use href="#star-mark" x="289" y="137" width="30" height="30"/>
      <use href="#star-mark" x="257" y="121" width="30" height="30"/>
    </g>
  </svg>
