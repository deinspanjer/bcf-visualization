      <use href="#star-mark" x="115" y="105" width="30" height="30"/>
      <use href="#star-mark" x="175" y="105" width="30" height="30"/>
      <use href="#star-mark" x="135" y="275" width="30" height="30"/>
      <use href="#star-mark" x="295" y="105" width="30" height="30"/>
      <use href="#star-mark" x="35" y="155" width="30" height="30"/>
      <use href="#star-mark" x="235" y="15" width="30" height="30"/>
      <use href="#star-mark" x="145" y="5" width="30" height="30"/>
      <use href="#star-mark" x="55" y="15" width="30" height="30"/>
      <use href="#star-mark" x="255" y="155" width="30" height="30"/>
      <use href="#star-mark" x="105" y="55" width="30" height="30"/>
    </g>
