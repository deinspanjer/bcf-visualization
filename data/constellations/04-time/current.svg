<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" data-vertex-source="jumps"
       color="oklch(0.82 0.14 218)">
    <title>Time</title>
    <desc>Time as a constellation of its 11 jumps. One marker per jump.</desc>
    <defs xmlns="http://www.w3.org/2000/svg">
          <linearGradient id="ray-grad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="transparent"/>
            <stop offset="0.48" stop-color="#fff" stop-opacity="0.58"/>
            <stop offset="0.50" stop-color="#fff" stop-opacity="0.92"/>
            <stop offset="0.52" stop-color="#fff" stop-opacity="0.58"/>
            <stop offset="1" stop-color="transparent"/>
          </linearGradient>
          <symbol id="star-mark" viewBox="-50 -50 100 100" overflow="visible">
            <g filter="drop-shadow(0 0 1px #fff) drop-shadow(0 0 3px currentColor)" opacity="0.76">
              <g opacity="0.68" style="mix-blend-mode:screen">
                <rect x="-32.00" y="-0.390" width="64.00" height="0.780" rx="0.390" fill="url(#ray-grad)" transform="rotate(-3.00)"/>
                <rect x="-32.00" y="-0.390" width="64.00" height="0.780" rx="0.390" fill="url(#ray-grad)" transform="rotate(63.00)"/>
                <rect x="-32.00" y="-0.390" width="64.00" height="0.780" rx="0.390" fill="url(#ray-grad)" transform="rotate(117.00)"/>
                <rect x="-32.00" y="-0.390" width="64.00" height="0.780" rx="0.390" fill="url(#ray-grad)" transform="rotate(183.00)"/>
                <rect x="-32.00" y="-0.390" width="64.00" height="0.780" rx="0.390" fill="url(#ray-grad)" transform="rotate(237.00)"/>
                <rect x="-32.00" y="-0.390" width="64.00" height="0.780" rx="0.390" fill="url(#ray-grad)" transform="rotate(303.00)"/>
              </g>
              <g opacity="0.32" style="mix-blend-mode:screen">
                <rect x="-18.00" y="-0.125" width="36.00" height="0.250" rx="0.125" fill="url(#ray-grad)" transform="rotate(27.00)"/>
                <rect x="-18.00" y="-0.125" width="36.00" height="0.250" rx="0.125" fill="url(#ray-grad)" transform="rotate(93.00)"/>
                <rect x="-18.00" y="-0.125" width="36.00" height="0.250" rx="0.125" fill="url(#ray-grad)" transform="rotate(147.00)"/>
                <rect x="-18.00" y="-0.125" width="36.00" height="0.250" rx="0.125" fill="url(#ray-grad)" transform="rotate(213.00)"/>
                <rect x="-18.00" y="-0.125" width="36.00" height="0.250" rx="0.125" fill="url(#ray-grad)" transform="rotate(267.00)"/>
                <rect x="-18.00" y="-0.125" width="36.00" height="0.250" rx="0.125" fill="url(#ray-grad)" transform="rotate(333.00)"/>
              </g>
              <circle r="2.2" fill="currentColor" opacity="0.16"/>
              <circle r="1.4" fill="#fff"/>
            </g>
          </symbol>
        </defs>

    <!-- Wireframe edges edited in tracing-workbench.html. -->
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="96.0,64.9 224.0,64.9 224.0,112.9 168.0,160.9"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="96.0,256.9 224.0,256.9"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="96.0,112.9 96.0,64.9"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="96.0,112.9 152.0,160.9"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="152.0,160.9 96.0,208.9"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="96.0,208.9 96.0,256.9"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="224.0,208.9 224.0,256.9"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="224.0,208.9 168.0,160.9"/>
    <polyline class="cluster-outline" fill="none" stroke="currentColor" stroke-opacity="0.32" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" points="96.0,112.9 224.0,112.9"/>

    <!-- One diffraction-spike marker per unique vertex. -->
    <g class="jump-markers">
      <use href="#star-mark" x="81.0" y="49.9" width="30" height="30"/>
      <use href="#star-mark" x="209.0" y="49.9" width="30" height="30"/>
      <use href="#star-mark" x="153.0" y="145.9" width="30" height="30"/>
      <use href="#star-mark" x="81.0" y="241.9" width="30" height="30"/>
      <use href="#star-mark" x="209.0" y="241.9" width="30" height="30"/>
      <use href="#star-mark" x="81.0" y="193.9" width="30" height="30"/>
      <use href="#star-mark" x="209.0" y="193.9" width="30" height="30"/>
      <use href="#star-mark" x="145.0" y="185.9" width="30" height="30"/>
      <use href="#star-mark" x="81.0" y="97.9" width="30" height="30"/>
      <use href="#star-mark" x="137.0" y="145.9" width="30" height="30"/>
      <use href="#star-mark" x="209.0" y="97.9" width="30" height="30"/>
    </g>
  </svg>
