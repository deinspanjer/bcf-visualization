      <use href="#star-mark" x="205" y="35" width="30" height="30"/>
      <use href="#star-mark" x="85" y="35" width="30" height="30"/>
      <use href="#star-mark" x="-15" y="45" width="30" height="30"/>
      <use href="#star-mark" x="85" y="105" width="30" height="30"/>
      <use href="#star-mark" x="45" y="165" width="30" height="30"/>
