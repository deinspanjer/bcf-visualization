      <use href="#star-mark" x="75" y="45" width="30" height="30"/>
      <use href="#star-mark" x="-15" y="55" width="30" height="30"/>
      <use href="#star-mark" x="305" y="45" width="30" height="30"/>
      <use href="#star-mark" x="35" y="65" width="30" height="30"/>
      <use href="#star-mark" x="295" y="65" width="30" height="30"/>
      <use href="#star-mark" x="85" y="135" width="30" height="30"/>
