<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Diffraction star roll marker v2</title>
  <desc id="desc">Refined astronomical roll marker mockup with stronger diffraction spikes, smaller free-perk points nested inside the spike rays, and readable labels below each sample.</desc>
  <defs>
    <radialGradient id="space-bg" cx="50%" cy="35%" r="80%">
      <stop offset="0" stop-color="#28313d"/>
      <stop offset="0.55" stop-color="#121822"/>
      <stop offset="1" stop-color="#080a0f"/>
    </radialGradient>
    <filter id="bloom" x="-260%" y="-260%" width="620%" height="620%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="soft"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="wide"/>
      <feMerge>
        <feMergeNode in="wide"/>
        <feMergeNode in="soft"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="tiny-bloom" x="-180%" y="-180%" width="460%" height="460%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.6" result="soft"/>
      <feMerge>
        <feMergeNode in="soft"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <radialGradient id="toolkits-core">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="0.16" stop-color="#e7f8ff"/>
      <stop offset="0.42" stop-color="#71cef9"/>
      <stop offset="0.72" stop-color="#2f6f9f"/>
      <stop offset="1" stop-color="#2f6f9f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="quality-core">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="0.18" stop-color="#edffed"/>
      <stop offset="0.45" stop-color="#8ee596"/>
      <stop offset="0.74" stop-color="#3d7c44"/>
      <stop offset="1" stop-color="#3d7c44" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="knowledge-core">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="0.18" stop-color="#f0ecff"/>
      <stop offset="0.45" stop-color="#b6acff"/>
      <stop offset="0.74" stop-color="#6a5acd"/>
      <stop offset="1" stop-color="#6a5acd" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="personal-core">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="0.18" stop-color="#f8ffdf"/>
      <stop offset="0.45" stop-color="#c0e980"/>
      <stop offset="0.74" stop-color="#4f6f3b"/>
      <stop offset="1" stop-color="#4f6f3b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="capstone-core">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="0.18" stop-color="#ffe7e7"/>
      <stop offset="0.45" stop-color="#ff9494"/>
      <stop offset="0.74" stop-color="#b63b3b"/>
      <stop offset="1" stop-color="#b63b3b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="miss-core">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="0.25" stop-color="#d9dde2"/>
      <stop offset="0.62" stop-color="#7b828d"/>
      <stop offset="1" stop-color="#7b828d" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="spike-blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7bd8ff" stop-opacity="0"/>
      <stop offset="0.28" stop-color="#7bd8ff" stop-opacity=".15"/>
      <stop offset="0.46" stop-color="#e4f8ff" stop-opacity=".68"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity=".98"/>
      <stop offset="0.54" stop-color="#e4f8ff" stop-opacity=".68"/>
      <stop offset="0.72" stop-color="#7bd8ff" stop-opacity=".15"/>
      <stop offset="1" stop-color="#7bd8ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="spike-green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9ff3a5" stop-opacity="0"/>
      <stop offset="0.28" stop-color="#9ff3a5" stop-opacity=".15"/>
      <stop offset="0.46" stop-color="#e7ffe8" stop-opacity=".68"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity=".98"/>
      <stop offset="0.54" stop-color="#e7ffe8" stop-opacity=".68"/>
      <stop offset="0.72" stop-color="#9ff3a5" stop-opacity=".15"/>
      <stop offset="1" stop-color="#9ff3a5" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="spike-violet" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c2b9ff" stop-opacity="0"/>
      <stop offset="0.28" stop-color="#c2b9ff" stop-opacity=".15"/>
      <stop offset="0.46" stop-color="#f0ecff" stop-opacity=".68"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity=".98"/>
      <stop offset="0.54" stop-color="#f0ecff" stop-opacity=".68"/>
      <stop offset="0.72" stop-color="#c2b9ff" stop-opacity=".15"/>
      <stop offset="1" stop-color="#c2b9ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="spike-olive" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d2f294" stop-opacity="0"/>
      <stop offset="0.28" stop-color="#d2f294" stop-opacity=".15"/>
      <stop offset="0.46" stop-color="#f7ffdf" stop-opacity=".68"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity=".98"/>
      <stop offset="0.54" stop-color="#f7ffdf" stop-opacity=".68"/>
      <stop offset="0.72" stop-color="#d2f294" stop-opacity=".15"/>
      <stop offset="1" stop-color="#d2f294" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="spike-red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff9a9a" stop-opacity="0"/>
      <stop offset="0.28" stop-color="#ff9a9a" stop-opacity=".15"/>
      <stop offset="0.46" stop-color="#ffe3e3" stop-opacity=".68"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity=".98"/>
      <stop offset="0.54" stop-color="#ffe3e3" stop-opacity=".68"/>
      <stop offset="0.72" stop-color="#ff9a9a" stop-opacity=".15"/>
      <stop offset="1" stop-color="#ff9a9a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="spike-gray" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c4cad3" stop-opacity="0"/>
      <stop offset="0.44" stop-color="#e2e6eb" stop-opacity=".38"/>
      <stop offset="0.5" stop-color="#fff" stop-opacity=".66"/>
      <stop offset="0.56" stop-color="#e2e6eb" stop-opacity=".38"/>
      <stop offset="1" stop-color="#c4cad3" stop-opacity="0"/>
    </linearGradient>

    <g id="spikes-blue">
      <rect x="-43" y="-1.4" width="86" height="2.8" fill="url(#spike-blue)"/>
      <rect x="-32" y="-1" width="64" height="2" fill="url(#spike-blue)" transform="rotate(90)"/>
      <rect x="-26" y="-.65" width="52" height="1.3" fill="url(#spike-blue)" transform="rotate(45)"/>
      <rect x="-26" y="-.65" width="52" height="1.3" fill="url(#spike-blue)" transform="rotate(-45)"/>
    </g>
    <g id="spikes-green">
      <rect x="-43" y="-1.4" width="86" height="2.8" fill="url(#spike-green)"/>
      <rect x="-32" y="-1" width="64" height="2" fill="url(#spike-green)" transform="rotate(90)"/>
      <rect x="-26" y="-.65" width="52" height="1.3" fill="url(#spike-green)" transform="rotate(45)"/>
      <rect x="-26" y="-.65" width="52" height="1.3" fill="url(#spike-green)" transform="rotate(-45)"/>
    </g>
    <g id="spikes-violet">
      <rect x="-43" y="-1.4" width="86" height="2.8" fill="url(#spike-violet)"/>
      <rect x="-32" y="-1" width="64" height="2" fill="url(#spike-violet)" transform="rotate(90)"/>
      <rect x="-26" y="-.65" width="52" height="1.3" fill="url(#spike-violet)" transform="rotate(45)"/>
      <rect x="-26" y="-.65" width="52" height="1.3" fill="url(#spike-violet)" transform="rotate(-45)"/>
    </g>
    <g id="spikes-olive">
      <rect x="-43" y="-1.4" width="86" height="2.8" fill="url(#spike-olive)"/>
      <rect x="-32" y="-1" width="64" height="2" fill="url(#spike-olive)" transform="rotate(90)"/>
      <rect x="-26" y="-.65" width="52" height="1.3" fill="url(#spike-olive)" transform="rotate(45)"/>
      <rect x="-26" y="-.65" width="52" height="1.3" fill="url(#spike-olive)" transform="rotate(-45)"/>
    </g>
    <g id="spikes-red">
      <rect x="-43" y="-1.4" width="86" height="2.8" fill="url(#spike-red)"/>
      <rect x="-32" y="-1" width="64" height="2" fill="url(#spike-red)" transform="rotate(90)"/>
      <rect x="-26" y="-.65" width="52" height="1.3" fill="url(#spike-red)" transform="rotate(45)"/>
      <rect x="-26" y="-.65" width="52" height="1.3" fill="url(#spike-red)" transform="rotate(-45)"/>
    </g>
    <g id="spikes-gray">
      <rect x="-30" y="-1" width="60" height="2" fill="url(#spike-gray)"/>
      <rect x="-22" y="-.7" width="44" height="1.4" fill="url(#spike-gray)" transform="rotate(90)"/>
    </g>

    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { fill: #f5f0e7; font-size: 31px; font-weight: 650; letter-spacing: 0; }
      .subtitle { fill: #b7c0cc; font-size: 16px; }
      .track-label { fill: #8b95a2; font-size: 12px; font-weight: 700; letter-spacing: .08em; }
      .sample-title { fill: #eee7d8; font-size: 16px; font-weight: 650; }
      .sample-copy { fill: #abb5c2; font-size: 12.5px; }
      .axis { stroke: #4b535e; stroke-width: 1; }
      .lane { fill: rgba(255,255,255,.035); stroke: rgba(255,255,255,.08); stroke-width: 1; }
      .tick { stroke: rgba(255,255,255,.12); stroke-width: 1; }
      .source { filter: url(#bloom); }
      .core { filter: url(#tiny-bloom); }
      .airy { fill: none; stroke: rgba(255,255,255,.3); stroke-width: .8; }
      .airy-soft { fill: none; stroke: rgba(255,255,255,.13); stroke-width: .8; }
      .companion { filter: url(#tiny-bloom); }
      .hit-target { fill: rgba(255,255,255,.045); stroke: rgba(255,255,255,.12); stroke-width: 1; stroke-dasharray: 2 3; }
      .untracked-ring { fill: none; stroke: rgba(255,255,255,.75); stroke-width: 1.5; stroke-dasharray: 2.6 2.4; }
      .label-card { fill: rgba(10,13,18,.82); stroke: rgba(255,255,255,.08); }
    </style>
  </defs>

  <rect width="1400" height="820" fill="url(#space-bg)"/>
  <g opacity=".32">
    <circle cx="155" cy="104" r=".8" fill="#fff"/>
    <circle cx="294" cy="80" r=".7" fill="#cfe7ff"/>
    <circle cx="471" cy="126" r=".9" fill="#fff"/>
    <circle cx="690" cy="88" r=".7" fill="#fff"/>
    <circle cx="984" cy="118" r=".8" fill="#cfe7ff"/>
    <circle cx="1256" cy="88" r=".7" fill="#fff"/>
    <circle cx="1120" cy="540" r=".8" fill="#fff"/>
    <circle cx="366" cy="548" r=".7" fill="#fff"/>
  </g>

  <text x="70" y="46" class="title">Diffraction-star roll markers, v2</text>
  <text x="70" y="72" class="subtitle">Stronger optical spikes. Free perks are small companion points inside the spike rays, not separate dots outside the system.</text>

  <rect x="62" y="100" width="1276" height="430" rx="8" fill="#10151d" stroke="#343b46"/>
  <text x="88" y="142" class="track-label">HITS</text>
  <text x="88" y="348" class="track-label">MISSES / UNKNOWN</text>
  <rect x="170" y="122" width="1110" height="156" rx="6" class="lane"/>
  <rect x="170" y="322" width="1110" height="112" rx="6" class="lane"/>
  <line x1="170" y1="200" x2="1280" y2="200" class="axis"/>
  <line x1="170" y1="378" x2="1280" y2="378" class="axis"/>

  <g class="ticks">
    <line x1="232" y1="110" x2="232" y2="446" class="tick"/>
    <line x1="398" y1="110" x2="398" y2="446" class="tick"/>
    <line x1="562" y1="110" x2="562" y2="446" class="tick"/>
    <line x1="728" y1="110" x2="728" y2="446" class="tick"/>
    <line x1="894" y1="110" x2="894" y2="446" class="tick"/>
    <line x1="1060" y1="110" x2="1060" y2="446" class="tick"/>
    <line x1="1218" y1="110" x2="1218" y2="446" class="tick"/>
  </g>

  <g transform="translate(232 200)">
    <circle r="28" class="hit-target"/>
    <g class="source"><use href="#spikes-blue"/><circle r="15" fill="url(#toolkits-core)"/></g>
    <circle r="5.3" fill="#fff" class="core"/>
    <circle r="11.2" class="airy"/>
    <circle r="18" class="airy-soft"/>
  </g>

  <g transform="translate(398 200)">
    <circle r="34" class="hit-target"/>
    <g transform="translate(-8 1)" class="source"><use href="#spikes-green"/><circle r="13.5" fill="url(#quality-core)"/></g>
    <g transform="translate(10 -2) scale(.86)" class="source"><use href="#spikes-green"/><circle r="13.5" fill="url(#quality-core)"/></g>
    <circle cx="-8" cy="1" r="4.8" fill="#fff" class="core"/>
    <circle cx="10" cy="-2" r="4.2" fill="#fff" class="core"/>
    <circle cx="-8" cy="1" r="11.5" class="airy"/>
    <circle cx="10" cy="-2" r="9.7" class="airy-soft"/>
  </g>

  <g transform="translate(562 200)">
    <circle r="39" class="hit-target"/>
    <g transform="translate(-12 5) scale(.78)" class="source"><use href="#spikes-violet"/><circle r="13" fill="url(#knowledge-core)"/></g>
    <g transform="translate(12 5) scale(.78)" class="source"><use href="#spikes-violet"/><circle r="13" fill="url(#knowledge-core)"/></g>
    <g transform="translate(0 -10)" class="source"><use href="#spikes-violet"/><circle r="14" fill="url(#knowledge-core)"/></g>
    <circle cx="-12" cy="5" r="3.8" fill="#fff" class="core"/>
    <circle cx="12" cy="5" r="3.8" fill="#fff" class="core"/>
    <circle cx="0" cy="-10" r="4.8" fill="#fff" class="core"/>
  </g>

  <g transform="translate(728 200)">
    <circle r="40" class="hit-target"/>
    <g class="source"><use href="#spikes-olive"/><circle r="15" fill="url(#personal-core)"/></g>
    <circle r="5.5" fill="#fff" class="core"/>
    <circle r="11.5" class="airy"/>
    <g class="companion">
      <circle cx="0" cy="-18" r="2.1" fill="#fff"/>
      <circle cx="0" cy="-18" r="4.4" fill="url(#personal-core)" opacity=".8"/>
      <circle cx="18" cy="0" r="1.8" fill="#fff"/>
      <circle cx="18" cy="0" r="3.8" fill="url(#personal-core)" opacity=".72"/>
      <circle cx="-13" cy="-13" r="1.7" fill="#fff"/>
      <circle cx="-13" cy="-13" r="3.7" fill="url(#personal-core)" opacity=".72"/>
    </g>
  </g>

  <g transform="translate(894 200)">
    <circle r="43" class="hit-target"/>
    <g transform="translate(-8 3)" class="source"><use href="#spikes-red"/><circle r="14" fill="url(#capstone-core)"/></g>
    <g transform="translate(10 -4) scale(.9)" class="source"><use href="#spikes-red"/><circle r="14" fill="url(#capstone-core)"/></g>
    <circle cx="-8" cy="3" r="4.8" fill="#fff" class="core"/>
    <circle cx="10" cy="-4" r="4.3" fill="#fff" class="core"/>
    <g class="companion">
      <circle cx="0" cy="-22" r="2" fill="#fff"/>
      <circle cx="0" cy="-22" r="4.2" fill="url(#capstone-core)" opacity=".78"/>
      <circle cx="23" cy="0" r="1.7" fill="#fff"/>
      <circle cx="-20" cy="13" r="1.6" fill="#fff"/>
    </g>
  </g>

  <g transform="translate(1060 200)">
    <circle r="35" class="hit-target"/>
    <g class="source"><use href="#spikes-blue"/><circle r="14" fill="url(#toolkits-core)"/></g>
    <circle r="5" fill="#fff" class="core"/>
    <circle r="11.5" class="airy"/>
    <circle r="20" class="untracked-ring"/>
  </g>

  <g transform="translate(1218 378)">
    <circle r="28" class="hit-target"/>
    <g opacity=".8" class="source"><use href="#spikes-gray"/><circle r="11" fill="url(#miss-core)"/></g>
    <circle r="3.7" fill="#eef2f7" opacity=".9"/>
  </g>

  <g transform="translate(78 575)">
    <rect width="178" height="92" rx="7" class="label-card"/>
    <text x="14" y="27" class="sample-title">Single paid hit</text>
    <text x="14" y="52" class="sample-copy">Bright point source.</text>
    <text x="14" y="72" class="sample-copy">Cost controls bloom size.</text>
  </g>
  <g transform="translate(276 575)">
    <rect width="178" height="92" rx="7" class="label-card"/>
    <text x="14" y="27" class="sample-title">Binary system</text>
    <text x="14" y="52" class="sample-copy">Two paid perks.</text>
    <text x="14" y="72" class="sample-copy">One roll position.</text>
  </g>
  <g transform="translate(474 575)">
    <rect width="178" height="92" rx="7" class="label-card"/>
    <text x="14" y="27" class="sample-title">Trinary system</text>
    <text x="14" y="52" class="sample-copy">Three or more paid perks.</text>
    <text x="14" y="72" class="sample-copy">Tight stellar grouping.</text>
  </g>
  <g transform="translate(672 575)">
    <rect width="178" height="92" rx="7" class="label-card"/>
    <text x="14" y="27" class="sample-title">Free add-ons</text>
    <text x="14" y="52" class="sample-copy">Small points inside rays.</text>
    <text x="14" y="72" class="sample-copy">Never separate lane dots.</text>
  </g>
  <g transform="translate(870 575)">
    <rect width="178" height="92" rx="7" class="label-card"/>
    <text x="14" y="27" class="sample-title">Multi + free</text>
    <text x="14" y="52" class="sample-copy">Binary core plus tiny</text>
    <text x="14" y="72" class="sample-copy">companions in spikes.</text>
  </g>
  <g transform="translate(1068 575)">
    <rect width="178" height="92" rx="7" class="label-card"/>
    <text x="14" y="27" class="sample-title">Untracked</text>
    <text x="14" y="52" class="sample-copy">Same star language.</text>
    <text x="14" y="72" class="sample-copy">Dashed catalog ring.</text>
  </g>
  <g transform="translate(1266 575)">
    <rect width="92" height="92" rx="7" class="label-card"/>
    <text x="12" y="27" class="sample-title">Miss</text>
    <text x="12" y="52" class="sample-copy">Cooler,</text>
    <text x="12" y="72" class="sample-copy">dimmer.</text>
  </g>

  <rect x="70" y="706" width="1260" height="52" rx="7" fill="rgba(10,13,18,.72)" stroke="rgba(255,255,255,.08)"/>
  <text x="92" y="729" class="sample-copy">The faint dashed circles around markers represent invisible click/touch targets only. They would not be rendered in the final scrubber.</text>
  <text x="92" y="749" class="sample-copy">Implementation target: one logical button per roll, with CSS/SVG children for cores, spikes, rings, and free-perk companion points.</text>
</svg>
