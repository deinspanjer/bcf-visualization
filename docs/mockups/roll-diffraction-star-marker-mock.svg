<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Astronomical roll marker mockup</title>
  <desc id="desc">High fidelity mockup of proposed scrubber roll markers using luminous Airy disks, diffraction spikes, binary and trinary star systems, and tiny free add-on companion points.</desc>
  <defs>
    <radialGradient id="space-bg" cx="52%" cy="42%" r="78%">
      <stop offset="0" stop-color="#27303a"/>
      <stop offset="0.55" stop-color="#141922"/>
      <stop offset="1" stop-color="#090b10"/>
    </radialGradient>
    <filter id="deep-bloom" x="-220%" y="-220%" width="540%" height="540%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="small-bloom" x="-180%" y="-180%" width="460%" height="460%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="toolkits-core">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.18" stop-color="#dff4ff"/>
      <stop offset="0.42" stop-color="#6cc7f5"/>
      <stop offset="0.72" stop-color="#2f6f9f"/>
      <stop offset="1" stop-color="#2f6f9f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="quality-core">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.2" stop-color="#e8ffe8"/>
      <stop offset="0.45" stop-color="#89e192"/>
      <stop offset="0.76" stop-color="#3d7c44"/>
      <stop offset="1" stop-color="#3d7c44" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="knowledge-core">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.2" stop-color="#eeeaff"/>
      <stop offset="0.46" stop-color="#b4a9ff"/>
      <stop offset="0.76" stop-color="#6a5acd"/>
      <stop offset="1" stop-color="#6a5acd" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="personal-core">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.2" stop-color="#f5ffd9"/>
      <stop offset="0.46" stop-color="#b7df78"/>
      <stop offset="0.76" stop-color="#4f6f3b"/>
      <stop offset="1" stop-color="#4f6f3b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="capstone-core">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.2" stop-color="#ffe5e5"/>
      <stop offset="0.46" stop-color="#ff8e8e"/>
      <stop offset="0.76" stop-color="#b63b3b"/>
      <stop offset="1" stop-color="#b63b3b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="miss-core">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.25" stop-color="#d9dde2"/>
      <stop offset="0.62" stop-color="#7b828d"/>
      <stop offset="1" stop-color="#7b828d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="blue-spike" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#80d7ff" stop-opacity="0"/>
      <stop offset="0.44" stop-color="#bdeeff" stop-opacity=".42"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity=".86"/>
      <stop offset="0.56" stop-color="#bdeeff" stop-opacity=".42"/>
      <stop offset="1" stop-color="#80d7ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="green-spike" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a5f3a8" stop-opacity="0"/>
      <stop offset="0.44" stop-color="#dcffdc" stop-opacity=".42"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity=".86"/>
      <stop offset="0.56" stop-color="#dcffdc" stop-opacity=".42"/>
      <stop offset="1" stop-color="#a5f3a8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="violet-spike" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c0b7ff" stop-opacity="0"/>
      <stop offset="0.44" stop-color="#eeeaff" stop-opacity=".42"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity=".86"/>
      <stop offset="0.56" stop-color="#eeeaff" stop-opacity=".42"/>
      <stop offset="1" stop-color="#c0b7ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="olive-spike" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d2f294" stop-opacity="0"/>
      <stop offset="0.44" stop-color="#f4ffd8" stop-opacity=".42"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity=".86"/>
      <stop offset="0.56" stop-color="#f4ffd8" stop-opacity=".42"/>
      <stop offset="1" stop-color="#d2f294" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="red-spike" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff9a9a" stop-opacity="0"/>
      <stop offset="0.44" stop-color="#ffe0e0" stop-opacity=".42"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity=".86"/>
      <stop offset="0.56" stop-color="#ffe0e0" stop-opacity=".42"/>
      <stop offset="1" stop-color="#ff9a9a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gray-spike" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b8bec8" stop-opacity="0"/>
      <stop offset="0.46" stop-color="#dce0e5" stop-opacity=".28"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity=".5"/>
      <stop offset="0.54" stop-color="#dce0e5" stop-opacity=".28"/>
      <stop offset="1" stop-color="#b8bec8" stop-opacity="0"/>
    </linearGradient>
    <g id="diffraction-blue">
      <rect x="-34" y="-0.8" width="68" height="1.6" fill="url(#blue-spike)"/>
      <rect x="-25" y="-0.55" width="50" height="1.1" fill="url(#blue-spike)" transform="rotate(90)"/>
      <rect x="-18" y="-0.42" width="36" height=".84" fill="url(#blue-spike)" transform="rotate(45)"/>
      <rect x="-18" y="-0.42" width="36" height=".84" fill="url(#blue-spike)" transform="rotate(-45)"/>
    </g>
    <g id="diffraction-green">
      <rect x="-34" y="-0.8" width="68" height="1.6" fill="url(#green-spike)"/>
      <rect x="-25" y="-0.55" width="50" height="1.1" fill="url(#green-spike)" transform="rotate(90)"/>
      <rect x="-18" y="-0.42" width="36" height=".84" fill="url(#green-spike)" transform="rotate(45)"/>
      <rect x="-18" y="-0.42" width="36" height=".84" fill="url(#green-spike)" transform="rotate(-45)"/>
    </g>
    <g id="diffraction-violet">
      <rect x="-34" y="-0.8" width="68" height="1.6" fill="url(#violet-spike)"/>
      <rect x="-25" y="-0.55" width="50" height="1.1" fill="url(#violet-spike)" transform="rotate(90)"/>
      <rect x="-18" y="-0.42" width="36" height=".84" fill="url(#violet-spike)" transform="rotate(45)"/>
      <rect x="-18" y="-0.42" width="36" height=".84" fill="url(#violet-spike)" transform="rotate(-45)"/>
    </g>
    <g id="diffraction-olive">
      <rect x="-34" y="-0.8" width="68" height="1.6" fill="url(#olive-spike)"/>
      <rect x="-25" y="-0.55" width="50" height="1.1" fill="url(#olive-spike)" transform="rotate(90)"/>
      <rect x="-18" y="-0.42" width="36" height=".84" fill="url(#olive-spike)" transform="rotate(45)"/>
      <rect x="-18" y="-0.42" width="36" height=".84" fill="url(#olive-spike)" transform="rotate(-45)"/>
    </g>
    <g id="diffraction-red">
      <rect x="-34" y="-0.8" width="68" height="1.6" fill="url(#red-spike)"/>
      <rect x="-25" y="-0.55" width="50" height="1.1" fill="url(#red-spike)" transform="rotate(90)"/>
      <rect x="-18" y="-0.42" width="36" height=".84" fill="url(#red-spike)" transform="rotate(45)"/>
      <rect x="-18" y="-0.42" width="36" height=".84" fill="url(#red-spike)" transform="rotate(-45)"/>
    </g>
    <g id="diffraction-gray">
      <rect x="-22" y="-0.65" width="44" height="1.3" fill="url(#gray-spike)"/>
      <rect x="-16" y="-0.45" width="32" height=".9" fill="url(#gray-spike)" transform="rotate(90)"/>
    </g>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { fill: #f4f1e8; font-size: 30px; font-weight: 650; letter-spacing: 0; }
      .subtitle { fill: #aeb5bf; font-size: 16px; }
      .track-label { fill: #88919d; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; }
      .caption { fill: #e8e1d1; font-size: 17px; font-weight: 650; }
      .meta { fill: #aab2bd; font-size: 13px; }
      .axis { stroke: #4b535e; stroke-width: 1; }
      .lane { fill: rgba(255,255,255,.035); stroke: rgba(255,255,255,.08); stroke-width: 1; }
      .tick { stroke: rgba(255,255,255,.14); stroke-width: 1; }
      .halo { opacity: .94; filter: url(#deep-bloom); }
      .core { filter: url(#small-bloom); }
      .airy { fill: none; stroke: rgba(255,255,255,.28); stroke-width: .8; }
      .ring2 { stroke-opacity: .12; }
      .sat { filter: url(#small-bloom); }
      .hit-target { fill: rgba(255,255,255,.06); stroke: rgba(255,255,255,.13); stroke-width: 1; stroke-dasharray: 2 3; }
      .untracked-ring { fill: none; stroke: rgba(255,255,255,.68); stroke-width: 1.4; stroke-dasharray: 2.5 2.5; }
    </style>
  </defs>

  <rect width="1400" height="760" fill="url(#space-bg)"/>
  <g opacity=".35">
    <circle cx="191" cy="91" r="1" fill="#fff"/>
    <circle cx="326" cy="125" r=".8" fill="#b9d8ff"/>
    <circle cx="498" cy="73" r=".7" fill="#fff"/>
    <circle cx="818" cy="99" r=".9" fill="#fff"/>
    <circle cx="1142" cy="83" r=".8" fill="#d9e7ff"/>
    <circle cx="1255" cy="142" r=".7" fill="#fff"/>
    <circle cx="1046" cy="506" r=".8" fill="#fff"/>
    <circle cx="251" cy="528" r=".7" fill="#fff"/>
    <circle cx="610" cy="548" r=".9" fill="#d9e7ff"/>
  </g>

  <rect x="62" y="78" width="1276" height="442" rx="8" fill="#10151d" stroke="#343b46"/>
  <text x="70" y="44" class="title">Scrubber roll markers as diffraction stars</text>
  <text x="70" y="68" class="subtitle">Astronomical point sources: bright core, faint Airy rings, and short diffraction spikes instead of filled sticker silhouettes.</text>

  <text x="88" y="118" class="track-label">hits</text>
  <text x="88" y="332" class="track-label">misses / unknown</text>
  <rect x="170" y="96" width="1110" height="166" rx="6" class="lane"/>
  <rect x="170" y="306" width="1110" height="118" rx="6" class="lane"/>
  <line x1="170" y1="179" x2="1280" y2="179" class="axis"/>
  <line x1="170" y1="365" x2="1280" y2="365" class="axis"/>

  <g class="ticks">
    <line x1="230" y1="84" x2="230" y2="436" class="tick"/>
    <line x1="390" y1="84" x2="390" y2="436" class="tick"/>
    <line x1="552" y1="84" x2="552" y2="436" class="tick"/>
    <line x1="730" y1="84" x2="730" y2="436" class="tick"/>
    <line x1="894" y1="84" x2="894" y2="436" class="tick"/>
    <line x1="1062" y1="84" x2="1062" y2="436" class="tick"/>
    <line x1="1218" y1="84" x2="1218" y2="436" class="tick"/>
  </g>

  <g transform="translate(230 179)">
    <circle r="22" class="hit-target"/>
    <g class="halo"><use href="#diffraction-blue"/><circle r="13" fill="url(#toolkits-core)"/></g>
    <circle r="5.2" fill="#ffffff" class="core"/>
    <circle r="10.5" class="airy"/>
    <circle r="16" class="airy ring2"/>
  </g>
  <text x="198" y="470" class="caption">Single paid hit</text>
  <text x="198" y="493" class="meta">one point source, cost maps to bloom/spike reach</text>

  <g transform="translate(390 179)">
    <circle r="28" class="hit-target"/>
    <g transform="translate(-7 1)" class="halo"><use href="#diffraction-green"/><circle r="12" fill="url(#quality-core)"/></g>
    <g transform="translate(9 -2) scale(.86)" class="halo"><use href="#diffraction-green"/><circle r="12" fill="url(#quality-core)"/></g>
    <circle cx="-7" cy="1" r="4.8" fill="#ffffff" class="core"/>
    <circle cx="9" cy="-2" r="4.1" fill="#ffffff" class="core"/>
    <circle cx="-7" cy="1" r="11" class="airy"/>
    <circle cx="9" cy="-2" r="9" class="airy"/>
  </g>
  <text x="350" y="470" class="caption">Binary system</text>
  <text x="350" y="493" class="meta">two paid perks orbit the same roll position</text>

  <g transform="translate(552 179)">
    <circle r="33" class="hit-target"/>
    <g transform="translate(-10 5) scale(.78)" class="halo"><use href="#diffraction-violet"/><circle r="12" fill="url(#knowledge-core)"/></g>
    <g transform="translate(10 5) scale(.78)" class="halo"><use href="#diffraction-violet"/><circle r="12" fill="url(#knowledge-core)"/></g>
    <g transform="translate(0 -9)" class="halo"><use href="#diffraction-violet"/><circle r="13" fill="url(#knowledge-core)"/></g>
    <circle cx="-10" cy="5" r="3.8" fill="#ffffff" class="core"/>
    <circle cx="10" cy="5" r="3.8" fill="#ffffff" class="core"/>
    <circle cx="0" cy="-9" r="4.8" fill="#ffffff" class="core"/>
    <path d="M-10 5 L0 -9 L10 5" fill="none" stroke="rgba(196,188,255,.24)" stroke-width=".8"/>
  </g>
  <text x="510" y="470" class="caption">Trinary system</text>
  <text x="510" y="493" class="meta">three or more paid perks read as a tight star system</text>

  <g transform="translate(730 179)">
    <circle r="34" class="hit-target"/>
    <g class="halo"><use href="#diffraction-olive"/><circle r="14" fill="url(#personal-core)"/></g>
    <circle r="5.4" fill="#ffffff" class="core"/>
    <circle r="11" class="airy"/>
    <g class="sat">
      <circle cx="0" cy="-28" r="3.2" fill="#ffffff"/>
      <circle cx="0" cy="-28" r="8" fill="url(#personal-core)" opacity=".78"/>
      <circle cx="26" cy="-8" r="2.5" fill="#ffffff"/>
      <circle cx="26" cy="-8" r="6" fill="url(#personal-core)" opacity=".72"/>
      <circle cx="-25" cy="-8" r="2.5" fill="#ffffff"/>
      <circle cx="-25" cy="-8" r="6" fill="url(#personal-core)" opacity=".72"/>
    </g>
  </g>
  <text x="682" y="470" class="caption">Free add-ons</text>
  <text x="682" y="493" class="meta">small companion lights at the spike tips</text>

  <g transform="translate(894 179)">
    <circle r="37" class="hit-target"/>
    <g transform="translate(-8 3)" class="halo"><use href="#diffraction-red"/><circle r="13" fill="url(#capstone-core)"/></g>
    <g transform="translate(9 -4) scale(.9)" class="halo"><use href="#diffraction-red"/><circle r="13" fill="url(#capstone-core)"/></g>
    <circle cx="-8" cy="3" r="4.8" fill="#ffffff" class="core"/>
    <circle cx="9" cy="-4" r="4.3" fill="#ffffff" class="core"/>
    <g class="sat">
      <circle cx="0" cy="-31" r="2.8" fill="#ffffff"/>
      <circle cx="0" cy="-31" r="7" fill="url(#capstone-core)" opacity=".75"/>
      <circle cx="30" cy="4" r="2.3" fill="#ffffff"/>
      <circle cx="-27" cy="14" r="2.2" fill="#ffffff"/>
    </g>
  </g>
  <text x="838" y="470" class="caption">Multi + free</text>
  <text x="838" y="493" class="meta">clustered bright cores plus dimmer companion points</text>

  <g transform="translate(1062 179)">
    <circle r="30" class="hit-target"/>
    <g class="halo"><use href="#diffraction-blue"/><circle r="12" fill="url(#toolkits-core)"/></g>
    <circle r="4.8" fill="#ffffff" class="core"/>
    <circle r="17" class="untracked-ring"/>
  </g>
  <text x="1012" y="470" class="caption">Untracked</text>
  <text x="1012" y="493" class="meta">same astronomy language with a dashed cataloging ring</text>

  <g transform="translate(1218 365)">
    <circle r="22" class="hit-target"/>
    <g opacity=".72" class="halo"><use href="#diffraction-gray"/><circle r="10" fill="url(#miss-core)"/></g>
    <circle r="3.6" fill="#e8ebef" opacity=".85"/>
  </g>
  <text x="1164" y="470" class="caption">Miss / unknown</text>
  <text x="1164" y="493" class="meta">cool, dim point source with shorter spikes</text>

  <rect x="62" y="570" width="1276" height="118" rx="8" fill="#111720" stroke="#303844"/>
  <text x="88" y="608" class="caption">Implementation notes</text>
  <text x="88" y="635" class="meta">Use CSS/SVG pseudo-elements for the glow disk, Airy rings, and diffraction spikes. The dashed circles in this mock show invisible touch targets, not visible UI.</text>
  <text x="88" y="660" class="meta">This keeps one logical marker per roll: paid bundles become binary/trinary star systems, while free add-ons become smaller companion lights around the same center.</text>
</svg>
